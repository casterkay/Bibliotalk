services:
  ingestion:
    image: astral/uv:python3.12-trixie-slim
    working_dir: /workspace
    env_file:
      - .env
    volumes:
      - ../..:/workspace
      - bibliotalk_data:/data
    command:
      - uv
      - run
      - --package
      - bt_cli
      - bibliotalk
      - collector
      - run
      - --agent
      - ${BIBLIOTALK_AGENT}

  agents:
    image: astral/uv:python3.12-trixie-slim
    working_dir: /workspace
    env_file:
      - .env
    environment:
      AGENTS_SERVICE_URL: http://agents:8009
    volumes:
      - ../..:/workspace
      - bibliotalk_data:/data
    ports:
      - "${AGENTS_PORT:-8009}:8009"
    command:
      - uv
      - run
      - --with
      - uvicorn
      - --package
      - agents_service
      - uvicorn
      - agents_service.server:app
      - --host
      - 0.0.0.0
      - --port
      - "8009"

  voip:
    image: node:22-bookworm
    working_dir: /workspace/services/voip_service
    env_file:
      - .env
    environment:
      AGENTS_SERVICE_URL: http://agents:8009
      VOIP_SERVICE_HOST: 0.0.0.0
      VOIP_SERVICE_PORT: 9012
    volumes:
      - ../..:/workspace
      - voip_node_modules:/workspace/services/voip_service/node_modules
    ports:
      - "${VOIP_PORT:-9012}:9012"
    command:
      - sh
      - -lc
      - npm install && npm start
    depends_on:
      - agents

  discord:
    image: astral/uv:python3.12-trixie-slim
    working_dir: /workspace
    env_file:
      - .env
    environment:
      VOIP_SERVICE_URL: http://voip:9012
      AGENTS_SERVICE_URL: http://agents:8009
    volumes:
      - ../..:/workspace
      - bibliotalk_data:/data
    command:
      - uv
      - run
      - --package
      - bt_cli
      - bibliotalk
      - discord
      - run
    depends_on:
      - ingestion
      - agents
      - voip

  memories:
    image: astral/uv:python3.12-trixie-slim
    working_dir: /workspace
    env_file:
      - .env
    volumes:
      - ../..:/workspace
      - bibliotalk_data:/data
    ports:
      - "${MEMORIES_PORT:-8080}:${MEMORIES_PORT:-8080}"
    command:
      - uv
      - run
      - --package
      - bt_cli
      - bibliotalk
      - memories
      - run
      - --host
      - ${MEMORIES_HOST:-0.0.0.0}
      - --port
      - ${MEMORIES_PORT:-8080}

volumes:
  bibliotalk_data:
  voip_node_modules:
