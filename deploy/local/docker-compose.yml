services:
  ingestion:
    image: ghcr.io/astral-sh/uv:python3.11-bookworm
    working_dir: /workspace
    env_file:
      - .env
    volumes:
      - ../..:/workspace
      - bibliotalk_data:/data
    command:
      - uv
      - run
      - --package
      - bt_cli
      - bibliotalk
      - collector
      - run
      - --agent
      - ${BIBLIOTALK_AGENT}

  discord:
    image: ghcr.io/astral-sh/uv:python3.11-bookworm
    working_dir: /workspace
    env_file:
      - .env
    volumes:
      - ../..:/workspace
      - bibliotalk_data:/data
    command:
      - uv
      - run
      - --package
      - bt_cli
      - bibliotalk
      - discord
      - run
    depends_on:
      - ingestion

  memories:
    image: ghcr.io/astral-sh/uv:python3.11-bookworm
    working_dir: /workspace
    env_file:
      - .env
    volumes:
      - ../..:/workspace
      - bibliotalk_data:/data
    ports:
      - "${MEMORIES_PORT:-8080}:${MEMORIES_PORT:-8080}"
    command:
      - uv
      - run
      - --package
      - bt_cli
      - bibliotalk
      - memories
      - run
      - --host
      - ${MEMORIES_HOST:-0.0.0.0}
      - --port
      - ${MEMORIES_PORT:-8080}

volumes:
  bibliotalk_data:
