services:
  synapse:
    image: matrixdotorg/synapse:latest
    container_name: bibliotalk-synapse
    restart: unless-stopped
    command:
      - run
      - --config-path=/data/homeserver.yaml
      - --config-path=/data/homeserver.local.yaml
    environment:
      - SYNAPSE_SERVER_NAME=${MATRIX_SERVER_NAME:-localhost}
      - SYNAPSE_REPORT_STATS=no
      - http_proxy=${MATRIX_HTTP_PROXY:-}
      - https_proxy=${MATRIX_HTTPS_PROXY:-}
      - HTTP_PROXY=${MATRIX_HTTP_PROXY:-}
      - HTTPS_PROXY=${MATRIX_HTTPS_PROXY:-}
      - no_proxy=${MATRIX_NO_PROXY:-localhost,127.0.0.1}
      - NO_PROXY=${MATRIX_NO_PROXY:-localhost,127.0.0.1}
    volumes:
      - ./synapse/data:/data
      - ./appservice:/data/appservices:ro
    ports:
      - "${SYNAPSE_PORT:-8008}:8008"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8008/_matrix/client/versions').read()",
        ]
      interval: 5s
      timeout: 3s
      retries: 30

  element:
    image: vectorim/element-web:latest
    container_name: bibliotalk-element
    restart: unless-stopped
    depends_on:
      synapse:
        condition: service_healthy
    volumes:
      - ./element/config.json:/app/config.json:ro
    ports:
      - "${ELEMENT_PORT:-8081}:80"

  # Element Call (MatrixRTC UI). Element Web uses `Developer.elementCallUrl` to open this.
  element-call:
    image: ghcr.io/element-hq/element-call:latest
    container_name: bibliotalk-element-call
    restart: unless-stopped
    depends_on:
      synapse:
        condition: service_healthy
    volumes:
      # Image entrypoints vary; mount config to both common locations.
      - ./element_call/config.json:/app/config.json:ro
      - ./element_call/config.json:/usr/share/nginx/html/config.json:ro
    ports:
      - "${ELEMENT_CALL_PORT:-9011}:80"

  # LiveKit SFU for MatrixRTC.
  livekit:
    image: livekit/livekit-server:latest
    container_name: bibliotalk-livekit
    restart: unless-stopped
    command: ["--config", "/etc/livekit.yaml"]
    environment:
      - LIVEKIT_KEYS=${LIVEKIT_KEYS:-devkey:devsecret}
    volumes:
      - ./livekit/livekit.yaml:/etc/livekit.yaml:ro
    ports:
      - "${LIVEKIT_PORT:-7880}:7880"
      - "${LIVEKIT_UDP_PORT:-7881}:7881/udp"
      - "50100-50200:50100-50200/udp"

  # MatrixRTC Authorization Service (issues LiveKit JWTs after validating Synapse OpenID tokens).
  lk-jwt-service:
    image: ghcr.io/element-hq/lk-jwt-service:0.4.1
    container_name: bibliotalk-lk-jwt-service
    restart: unless-stopped
    depends_on:
      - livekit
    environment:
      # Must be reachable by both Docker containers and host/browser. We use `*.localhost`
      # plus `extra_hosts` to map it to the host gateway inside containers.
      - LIVEKIT_URL=${LIVEKIT_URL:-http://livekit.localhost:${LIVEKIT_PORT:-7880}}
      - LIVEKIT_KEY=${LIVEKIT_KEY:-devkey}
      - LIVEKIT_SECRET=${LIVEKIT_SECRET:-devsecret}
      - LIVEKIT_FULL_ACCESS_HOMESERVERS=${LIVEKIT_FULL_ACCESS_HOMESERVERS:-localhost}
    extra_hosts:
      - "livekit.localhost:host-gateway"

  # Serves `/.well-known/matrix/client` and reverse-proxies `/livekit/jwt/* -> lk-jwt-service`.
  well-known:
    image: caddy:2
    container_name: bibliotalk-well-known
    restart: unless-stopped
    depends_on:
      - lk-jwt-service
    volumes:
      - ./well-known/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./well-known/site:/srv:ro
    ports:
      - "${WELL_KNOWN_PORT:-80}:80"
