[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "bt_webui"
version = "0.1.0"
description = "Bibliotalk operator admin panel (FastAPI BFF + static UI)"
requires-python = ">=3.11"
dependencies = [
  "aiosqlite>=0.20.0",
  "bt_common>=0.1.0",
  "bt_store>=0.1.0",
  "fastapi>=0.115.0",
  "httpx>=0.27.0",
  "pydantic>=2.8.0",
  "pydantic-settings>=2.4.0",
  "SQLAlchemy>=2.0.36",
  "uvicorn>=0.34.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.3.0",
  "pytest-asyncio>=0.23.8",
  "ruff>=0.6.9",
]

[tool.setuptools]
packages = [
  "bt_webui",
  "bt_webui.api",
]

[tool.setuptools.package-dir]
"bt_webui" = "src"

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "RUF"]
ignore = ["E501"]

[tool.uv.sources]
bt-common = { workspace = true }
bt-store = { workspace = true }
