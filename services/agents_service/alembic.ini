[alembic]
script_location = alembic
prepend_sys_path = .

# NOTE: Alembic uses a synchronous engine. If you set DATABASE_URL to an async
# driver URL (e.g. sqlite+aiosqlite:///...), env.py will normalize it.
sqlalchemy.url = sqlite:///./.agents_service/bibliotalk.sqlite

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
